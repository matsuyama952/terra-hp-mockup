<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero – 読売ベース / ビル版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>

/* ── Reset ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #04080f; }
body { font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }

/* ── 変数 ───────────────────────────────────
   読売のcube構造をCSS変数で制御
   --fw : 左右フェイスの幅
   --fh : 上下フェイスの高さ
─────────────────────────────────────────── */
:root {
  --fw: clamp(120px, 16vw, 210px);
  --fh: clamp(100px, 16vh, 160px);
  --border: 1px solid rgba(255,255,255,0.12);
  --dur-h:  9s;   /* 左右フェイスのループ速度 */
  --dur-v:  11s;  /* 上下フェイスのループ速度 */
}

/* ══════════════════════════════════════════
   HERO / SCENE
══════════════════════════════════════════ */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 580px;
  overflow: hidden;
}

/* キューブ全体の入場アニメ（読売準拠：少し遅れてフェードイン） */
.cube {
  position: absolute;
  inset: 0;
  opacity: 0;
  animation: cubeIn 1s ease 0.3s forwards;
}
@keyframes cubeIn { to { opacity: 1; } }

/* ── コーナー（4隅は暗色で塗りつぶし） ── */
.corner {
  position: absolute;
  width: var(--fw);
  height: var(--fh);
  background: #04080f;
  z-index: 2;
}
.corner--tl { top: 0;    left: 0; }
.corner--tr { top: 0;    right: 0; }
.corner--bl { bottom: 0; left: 0; }
.corner--br { bottom: 0; right: 0; }

/* ── フェイス共通 ── */
.face {
  position: absolute;
  overflow: hidden;
  z-index: 1;
}

/* ── 左フェイス（ビルが横 → 右にループ） ── */
.face--left {
  left: 0; top: var(--fh); bottom: var(--fh);
  width: var(--fw);
  border-right: var(--border);
}

/* ── 右フェイス（ビルが横 ← 左にループ） ── */
.face--right {
  right: 0; top: var(--fh); bottom: var(--fh);
  width: var(--fw);
  border-left: var(--border);
}

/* ── 上フェイス（ビルが縦 ↓ 下にループ） ── */
.face--top {
  top: 0;
  left: var(--fw); right: var(--fw);
  height: var(--fh);
  border-bottom: var(--border);
}

/* ── 下フェイス（ビルが縦 ↑ 上にループ） ── */
.face--bottom {
  bottom: 0;
  left: var(--fw); right: var(--fw);
  height: var(--fh);
  border-top: var(--border);
}

/* ── 中央フロント（メインコンテンツ面） ── */
.face--front {
  position: absolute;
  left: var(--fw); right: var(--fw);
  top: var(--fh); bottom: var(--fh);
  z-index: 1;
  background: url('images/hero-main.jpg') center 55% / cover no-repeat;
}
/* 中央に重ねるオーバーレイ（テキスト可読性） */
.face--front::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(130deg, rgba(4,8,24,0.72) 0%, rgba(4,8,24,0.35) 55%, rgba(4,8,24,0.15) 100%),
    linear-gradient(to top, rgba(4,8,24,0.55) 0%, transparent 45%);
}

/* 各フェイスにエッジシャドウ（立体感） */
.face--left::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(4,8,24,0.6) 0%, transparent 60%);
}
.face--right::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to left, rgba(4,8,24,0.6) 0%, transparent 60%);
}
.face--top::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(4,8,24,0.6) 0%, transparent 70%);
}
.face--bottom::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(4,8,24,0.55) 0%, transparent 70%);
}

/* ══════════════════════════════════════════
   読売準拠ループシステム
   2枚を --dur/2 ずらして 無限ループ
══════════════════════════════════════════ */

/* ── 横ループ（左・右フェイス用） ── */
.loop-h {
  display: flex;
  align-items: center;
  width: 100%;
  height: 100%;
}
.loop-h__item {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
  will-change: transform;
}
/* 右向き */
.loop-h--fwd .loop-h__item:first-child {
  animation: loopH var(--dur-h) calc(var(--dur-h) / -2) linear infinite;
}
.loop-h--fwd .loop-h__item:last-child {
  animation: loopH var(--dur-h) linear infinite;
}
@keyframes loopH {
  from { transform: translateX(-100%); }
  to   { transform: translateX( 100%); }
}
/* 左向き（逆） */
.loop-h--rev .loop-h__item:first-child {
  animation: loopHRev var(--dur-h) calc(var(--dur-h) / -2) linear infinite;
}
.loop-h--rev .loop-h__item:last-child {
  animation: loopHRev var(--dur-h) linear infinite;
}
@keyframes loopHRev {
  from { transform: translateX( 100%); }
  to   { transform: translateX(-100%); }
}

/* ── 縦ループ（上・下フェイス用） ── */
.loop-v {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  height: 200%; /* ×2 for loop */
  overflow: hidden;
}
.loop-v__item {
  flex-shrink: 0;
  width: 100%;
  height: 50%;
  will-change: transform;
}
/* 下向き */
.loop-v--down .loop-v__item:first-child {
  animation: loopVDown var(--dur-v) calc(var(--dur-v) / -2) linear infinite;
}
.loop-v--down .loop-v__item:last-child {
  animation: loopVDown var(--dur-v) linear infinite;
}
@keyframes loopVDown {
  from { transform: translateY(-100%); }
  to   { transform: translateY( 100%); }
}
/* 上向き */
.loop-v--up .loop-v__item:first-child {
  animation: loopVUp var(--dur-v) calc(var(--dur-v) / -2) linear infinite;
}
.loop-v--up .loop-v__item:last-child {
  animation: loopVUp var(--dur-v) linear infinite;
}
@keyframes loopVUp {
  from { transform: translateY( 100%); }
  to   { transform: translateY(-100%); }
}

/* ── ループ内の画像スタイル ── */
.loop-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* 各フェイスで見せる部分を最適化 */
.loop-img--left   { object-position: 20% 60%; }  /* 左側のビル群 */
.loop-img--right  { object-position: 80% 60%; }  /* 右側の高層ビル */
.loop-img--top    { object-position: 50% 15%; }  /* 空・雲 */
.loop-img--bottom { object-position: 50% 75%; }  /* 地上・建物下部 */

/* ══════════════════════════════════════════
   タイトル・コンテンツ（読売準拠：文字単位アニメ）
══════════════════════════════════════════ */
.headline {
  position: absolute;
  left: var(--fw);
  right: var(--fw);
  top: var(--fh);
  bottom: var(--fh);
  z-index: 20;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 6% 0 7%;
}

.headline__badge {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.80);
  margin-bottom: 26px;
  opacity: 0;
  animation: fadeUp 0.7s ease 1.1s forwards;
}
.badge__line {
  display: block;
  width: 30px;
  height: 1.5px;
  background: linear-gradient(to right, #5bbcf0, rgba(255,255,255,0.3));
}

.headline__title {
  font-size: clamp(38px, 5.4vw, 74px);
  font-weight: 900;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
  text-shadow: 0 2px 24px rgba(4,8,24,0.55);
}
.title__row { display: block; }

/* 1文字単位アニメ（読売の js-title-svg-text 相当） */
.char {
  display: inline-block;
  opacity: 0;
  transform: translateY(28px);
  animation: charIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes charIn {
  to { opacity: 1; transform: translateY(0); }
}

.headline__lead {
  font-size: clamp(12px, 1.4vw, 15px);
  color: rgba(255,255,255,0.78);
  line-height: 2.1;
  margin-bottom: 44px;
  opacity: 0;
  animation: fadeUp 0.7s ease 2.2s forwards;
}

.headline__cta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp 0.7s ease 2.5s forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── ボタン ── */
.btn {
  display: inline-block;
  padding: 14px 38px;
  font-size: 14px;
  font-weight: 700;
  border-radius: 3px;
  text-decoration: none;
  letter-spacing: 0.06em;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover { transform: translateY(-2px); }
.btn--primary {
  background: #1a80d8;
  color: #fff;
  box-shadow: 0 4px 20px rgba(26,128,216,0.40);
}
.btn--primary:hover { box-shadow: 0 8px 30px rgba(26,128,216,0.55); }
.btn--outline {
  border: 2px solid rgba(255,255,255,0.55);
  color: #fff;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(4px);
}
.btn--outline:hover { background: rgba(255,255,255,0.13); }

/* ══════════════════════════════════════════
   Scroll インジケーター（読売準拠）
══════════════════════════════════════════ */
.scroll {
  position: absolute;
  bottom: calc(var(--fh) + 28px);
  right: calc(var(--fw) + 28px);
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  opacity: 0;
  animation: fadeUp 0.7s ease 2.9s forwards;
}
.scroll__text {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.42em;
  color: rgba(255,255,255,0.45);
  writing-mode: vertical-rl;
  text-transform: uppercase;
}
.scroll__bar {
  width: 1px;
  height: 52px;
  background: rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}
.scroll__bar::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 50%;
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.85), transparent);
  animation: scrollFlow 2s ease-in-out 3.2s infinite;
}
@keyframes scrollFlow {
  from { transform: translateY(-200%); }
  to   { transform: translateY(400%); }
}

/* ── Replay ── */
.replay {
  position: fixed;
  bottom: 20px; right: 20px;
  z-index: 100;
  padding: 9px 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  background: rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.75);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 3px;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: background 0.2s;
}
.replay:hover { background: rgba(255,255,255,0.20); color: #fff; }

  </style>
</head>
<body>

<!-- ══ HERO ══════════════════════════════════════ -->
<section class="hero" id="hero">

  <!-- キューブ構造 -->
  <div class="cube" id="cube">

    <!-- ４コーナー（暗色パッチ） -->
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <!-- 中央フロント面（メイン背景） -->
    <div class="face face--front"></div>

    <!-- 左フェイス：ビルが右へ流れる -->
    <div class="face face--left">
      <div class="loop-h loop-h--fwd">
        <div class="loop-h__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--left" alt="">
        </div>
        <div class="loop-h__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--left" alt="">
        </div>
      </div>
    </div>

    <!-- 右フェイス：ビルが左へ流れる -->
    <div class="face face--right">
      <div class="loop-h loop-h--rev">
        <div class="loop-h__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--right" alt="">
        </div>
        <div class="loop-h__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--right" alt="">
        </div>
      </div>
    </div>

    <!-- 上フェイス：空・雲が下へ流れる -->
    <div class="face face--top">
      <div class="loop-v loop-v--down">
        <div class="loop-v__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--top" alt="">
        </div>
        <div class="loop-v__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--top" alt="">
        </div>
      </div>
    </div>

    <!-- 下フェイス：街並みが上へ流れる -->
    <div class="face face--bottom">
      <div class="loop-v loop-v--up">
        <div class="loop-v__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--bottom" alt="">
        </div>
        <div class="loop-v__item">
          <img src="images/hero-main.jpg" class="loop-img loop-img--bottom" alt="">
        </div>
      </div>
    </div>

  </div><!-- /cube -->

  <!-- タイトル -->
  <div class="headline" id="headline">
    <p class="headline__badge">
      <span class="badge__line"></span>
      au 正規代理店
    </p>
    <h1 class="headline__title" id="heroTitle">
      <span class="title__row">au法人携帯、</span>
      <span class="title__row">30年の信頼。</span>
    </h1>
    <p class="headline__lead">
      1995年創業。中小企業から大企業まで、<br>
      法人専門のプロフェッショナルが貴社の通信を最適化します。
    </p>
    <div class="headline__cta">
      <a href="#" class="btn btn--primary">無料で相談してみる</a>
      <a href="#" class="btn btn--outline">なぜテラか</a>
    </div>
  </div>

  <!-- Scroll -->
  <div class="scroll">
    <span class="scroll__text">Scroll</span>
    <span class="scroll__bar"></span>
  </div>

</section>

<button class="replay" id="replayBtn">▶ もう一度</button>

<!-- ══ JS：文字単位アニメ ════════════════════════ -->
<script>
(function () {

  /* タイトルを1文字ずつ <span class="char"> に分割 */
  function initChars() {
    var rows  = document.querySelectorAll('.title__row');
    var delay = 1.2;          // キューブが出てから開始
    var step  = 0.060;        // 1文字あたりのディレイ差
    var rowGap = 0.08;        // 行間ギャップ

    rows.forEach(function (row) {
      var text = row.textContent;
      row.textContent = '';

      Array.from(text).forEach(function (ch) {
        var span = document.createElement('span');
        span.className = 'char';
        span.textContent = ch;
        span.style.animationDelay = delay.toFixed(3) + 's';
        row.appendChild(span);
        delay += step;
      });
      delay += rowGap;
    });
  }

  /* リプレイ：アニメーションをリセット */
  function replay() {
    var els = document.querySelectorAll(
      '.cube, .headline__badge, .char, .headline__lead, .headline__cta, .scroll, .loop-h__item, .loop-v__item'
    );
    els.forEach(function (el) {
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = '';
    });
  }

  initChars();
  document.getElementById('replayBtn').addEventListener('click', replay);

})();
</script>

</body>
</html>
