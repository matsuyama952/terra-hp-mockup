<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4e8"/><stop offset="100%" stop-color="#dce8d0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- 空 -->
  <rect x="0" y="0" width="800" height="280" fill="#d8eaf8"/>
  <!-- 地面 -->
  <rect x="0" y="280" width="800" height="170" fill="#c8d8a8"/>
  <!-- 建設現場の足場 -->
  <rect x="200" y="100" width="400" height="220" fill="#c8ccd4" opacity="0.7"/>
  <line x1="200" y1="140" x2="600" y2="140" stroke="#a0a8b0" stroke-width="4"/>
  <line x1="200" y1="190" x2="600" y2="190" stroke="#a0a8b0" stroke-width="4"/>
  <line x1="200" y1="240" x2="600" y2="240" stroke="#a0a8b0" stroke-width="4"/>
  <line x1="280" y1="100" x2="280" y2="320" stroke="#a0a8b0" stroke-width="4"/>
  <line x1="400" y1="100" x2="400" y2="320" stroke="#a0a8b0" stroke-width="4"/>
  <line x1="520" y1="100" x2="520" y2="320" stroke="#a0a8b0" stroke-width="4"/>
  <!-- 建設中の壁 -->
  <rect x="200" y="100" width="400" height="220" fill="none" stroke="#808890" stroke-width="3"/>
  <!-- ヘルメットの人物 -->
  <ellipse cx="480" cy="256" rx="30" ry="32" fill="#d4a080"/>
  <rect x="454" y="284" width="52" height="60" fill="#f07700" rx="4"/>
  <rect x="456" y="244" width="48" height="16" rx="8" fill="#f0c030"/><!-- ヘルメット -->
  <path d="M456 244 Q480 234 504 244" stroke="#d4a010" stroke-width="2" fill="#f0c030"/>
  <path d="M472 270 Q480 277 488 270" stroke="#a06040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- スマホを見ている -->
  <rect x="504" y="285" width="22" height="36" rx="4" fill="#1a2030"/>
  <rect x="507" y="288" width="16" height="30" rx="2" fill="#007080"/>
  <!-- キッティング完了イメージ -->
  <rect x="100" y="280" width="140" height="80" rx="8" fill="white" opacity="0.9"/>
  <text x="170" y="308" font-family="sans-serif" font-size="10" fill="#007080" text-anchor="middle" font-weight="bold">設定完了</text>
  <circle cx="150" cy="330" r="12" fill="#40c060"/>
  <path d="M143 330 L149 337 L161 322" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="185" y="334" font-family="sans-serif" font-size="10" fill="#1a2e30" font-weight="bold">30台 完了</text>
  <!-- ラベル -->
  <rect x="0" y="390" width="800" height="60" fill="rgba(0,112,128,0.75)"/>
  <text x="400" y="422" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">導入事例③｜建設業（一括設定・配布）</text>
</svg>
