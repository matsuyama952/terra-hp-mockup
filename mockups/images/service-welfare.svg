<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fce8"/><stop offset="100%" stop-color="#d8f0c8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- テーブル -->
  <rect x="100" y="280" width="600" height="60" fill="#c8a870" rx="6"/>
  <rect x="140" y="336" width="20" height="50" fill="#b09060" rx="3"/>
  <rect x="640" y="336" width="20" height="50" fill="#b09060" rx="3"/>
  <!-- 野菜ボックス -->
  <rect x="160" y="200" width="120" height="80" rx="6" fill="#e8f4d0"/>
  <rect x="160" y="200" width="120" height="80" rx="6" fill="none" stroke="#90c060" stroke-width="2"/>
  <!-- 野菜アイコン -->
  <ellipse cx="195" cy="240" rx="18" ry="22" fill="#e85030"/><!-- トマト -->
  <rect x="192" y="218" width="6" height="8" fill="#40a030" rx="1"/>
  <ellipse cx="235" cy="245" rx="22" ry="16" fill="#f0c030"/><!-- レモン -->
  <path d="M170 255 Q185 235 200 255 Q215 235 230 255 Q245 235 260 255" stroke="#40a030" stroke-width="3" fill="none" stroke-linecap="round"/><!-- ハーブ -->
