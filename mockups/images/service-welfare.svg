  <rect x="0" y="390" width="800" height="60" fill="rgba(0,112,128,0.75)"/>
  <text x="400" y="422" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">福利厚生・社食サービス</text>
