  <rect x="320" y="190" width="140" height="90" rx="6" fill="#fff0e0"/>
  <rect x="320" y="190" width="140" height="90" rx="6" fill="none" stroke="#f0a030" stroke-width="2"/>
  <ellipse cx="360" cy="232" rx="22" ry="22" fill="#f07030"/><!-- オレンジ -->
  <ellipse cx="410" cy="228" rx="20" ry="24" fill="#f0e030"/><!-- バナナ風 -->
  <path d="M398 210 Q415 200 430 215" stroke="#c0a010" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 飲み物 -->
  <rect x="510" y="200" width="100" height="80" rx="6" fill="#e0f0fc"/>
  <rect x="510" y="200" width="100" height="80" rx="6" fill="none" stroke="#80c0e0" stroke-width="2"/>
  <rect x="530" y="210" width="24" height="60" rx="4" fill="#60b0d8"/>
  <rect x="562" y="215" width="24" height="55" rx="4" fill="#80c8e8"/>
  <ellipse cx="542" cy="210" rx="12" ry="5" fill="#40a0c8"/>
  <ellipse cx="574" cy="215" rx="12" ry="5" fill="#60b8d8"/>
