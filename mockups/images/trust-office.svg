<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8daf5"/>
      <stop offset="100%" stop-color="#dceefb"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#c8d8ec"/>
    </linearGradient>
  </defs>
  <!-- 空 -->
  <rect width="800" height="600" fill="url(#sky)"/>
  <!-- 雲 -->
  <ellipse cx="150" cy="120" rx="80" ry="30" fill="white" opacity="0.7"/>
  <ellipse cx="200" cy="110" rx="60" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="600" cy="90" rx="70" ry="28" fill="white" opacity="0.6"/>
  <ellipse cx="650" cy="80" rx="50" ry="22" fill="white" opacity="0.6"/>
  <!-- 道路 -->
  <rect x="0" y="480" width="800" height="120" fill="#c8cfd8"/>
  <rect x="0" y="478" width="800" height="6" fill="#a0aab8"/>
  <!-- 歩道 -->
  <rect x="0" y="460" width="800" height="20" fill="#d8dde6"/>
  <!-- ビル本体 -->
  <rect x="180" y="160" width="440" height="320" fill="url(#bldg)" rx="4"/>
  <!-- ビルのガラスファサード -->
  <rect x="200" y="180" width="400" height="280" fill="#dbeaf8" rx="2"/>
  <!-- 窓グリッド -->
  <g stroke="#a8c8e8" stroke-width="1" fill="none">
    <!-- 縦線 -->
    <line x1="260" y1="180" x2="260" y2="460"/>
    <line x1="320" y1="180" x2="320" y2="460"/>
    <line x1="380" y1="180" x2="380" y2="460"/>
    <line x1="440" y1="180" x2="440" y2="460"/>
    <line x1="500" y1="180" x2="500" y2="460"/>
    <line x1="560" y1="180" x2="560" y2="460"/>
    <!-- 横線 -->
    <line x1="200" y1="230" x2="600" y2="230"/>
    <line x1="200" y1="280" x2="600" y2="280"/>
    <line x1="200" y1="330" x2="600" y2="330"/>
    <line x1="200" y1="380" x2="600" y2="380"/>
    <line x1="200" y1="430" x2="600" y2="430"/>
  </g>
  <!-- 窓の反射 -->
  <rect x="210" y="190" width="40" height="30" fill="#b8d8f0" rx="1" opacity="0.6"/>
  <rect x="270" y="190" width="40" height="30" fill="#c8e4f8" rx="1" opacity="0.5"/>
  <rect x="390" y="240" width="40" height="30" fill="#b0d0ec" rx="1" opacity="0.6"/>
  <rect x="510" y="290" width="40" height="30" fill="#c0dcf4" rx="1" opacity="0.5"/>
  <!-- エントランス -->
  <rect x="340" y="390" width="120" height="70" fill="#90b8d8" rx="3"/>
  <rect x="340" y="390" width="56" height="70" fill="#7aaac8" rx="2"/>
  <!-- エントランスの手すり -->
  <rect x="320" y="455" width="160" height="5" fill="#8898a8" rx="2"/>
  <!-- 看板 -->
  <rect x="360" y="175" width="80" height="20" fill="#007080" rx="3"/>
  <text x="400" y="189" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">TERRA CSC</text>
  <!-- 木 -->
  <rect x="130" y="400" width="12" height="60" fill="#8a7060"/>
  <ellipse cx="136" cy="390" rx="36" ry="44" fill="#5a9060"/>
  <ellipse cx="120" cy="410" rx="24" ry="30" fill="#4a8050"/>
  <ellipse cx="152" cy="405" rx="22" ry="28" fill="#5a9560"/>
  <rect x="640" y="410" width="12" height="50" fill="#8a7060"/>
  <ellipse cx="646" cy="400" rx="32" ry="38" fill="#5a9060"/>
  <ellipse cx="630" cy="418" rx="22" ry="26" fill="#4a8050"/>
  <!-- ラベル -->
  <rect x="0" y="540" width="800" height="60" fill="rgba(0,112,128,0.75)"/>
  <text x="400" y="572" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">自社オフィス（渋谷区）</text>
</svg>
