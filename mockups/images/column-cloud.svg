<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8eefa"/><stop offset="100%" stop-color="#b8d8f4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)"/>
  <!-- 雲 -->
  <ellipse cx="400" cy="140" rx="150" ry="80" fill="white" opacity="0.9"/>
  <ellipse cx="310" cy="160" rx="90" ry="65" fill="white" opacity="0.9"/>
  <ellipse cx="490" cy="155" rx="100" ry="70" fill="white" opacity="0.9"/>
  <ellipse cx="400" cy="170" rx="170" ry="60" fill="white" opacity="0.9"/>
  <!-- クラウドアイコン outline -->
  <path d="M260 210 Q220 210 220 170 Q220 140 250 135 Q248 100 280 95 Q300 80 325 90 Q340 70 370 72 Q400 50 435 65 Q465 55 485 80 Q520 78 530 110 Q555 115 555 145 Q555 175 525 178 L260 178 Z" fill="none" stroke="#007080" stroke-width="2.5" opacity="0.5"/>
  <!-- Microsoft 365 風アイコン -->
  <rect x="140" y="220" width="70" height="70" rx="8" fill="#0078d4"/>
  <text x="175" y="263" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="900">M</text>
  <text x="175" y="280" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.8)" text-anchor="middle">Microsoft 365</text>
  <!-- Google Workspace 風アイコン -->
  <rect x="590" y="220" width="70" height="70" rx="8" fill="white"/>
  <rect x="590" y="220" width="70" height="70" rx="8" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="625" cy="255" r="18" fill="none" stroke="#4285f4" stroke-width="4"/>
  <path d="M625 255 L643 255" stroke="#4285f4" stroke-width="4"/>
  <path d="M625 237 L625 255" stroke="#4285f4" stroke-width="4"/>
  <text x="625" y="283" font-family="sans-serif" font-size="7" fill="#555" text-anchor="middle">Google Workspace</text>
  <!-- vs テキスト -->
  <text x="400" y="265" font-family="sans-serif" font-size="20" fill="#007080" text-anchor="middle" font-weight="900">vs</text>
  <!-- 接続線（クラウドから端末へ） -->
  <line x1="280" y1="185" x2="200" y2="218" stroke="#007080" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="520" y1="185" x2="600" y2="218" stroke="#007080" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- タグ -->
  <rect x="305" y="40" width="190" height="28" rx="14" fill="#007080"/>
  <text x="400" y="59" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">クラウドサービス比較</text>
  <!-- ラベル -->
  <rect x="0" y="300" width="800" height="50" fill="rgba(0,112,128,0.75)"/>
  <text x="400" y="330" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Microsoft 365 vs Google Workspace</text>
</svg>
