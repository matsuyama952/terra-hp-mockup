<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf4fc"/><stop offset="100%" stop-color="#d0e8f8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- 工場風の背景 -->
  <rect x="0" y="200" width="800" height="200" fill="#d8dce4"/>
  <rect x="60" y="130" width="200" height="200" fill="#c0c8d4"/>
  <rect x="80" y="160" width="40" height="80" fill="#a8b0bc"/><!-- 窓 -->
  <rect x="130" y="160" width="40" height="80" fill="#a8b0bc"/>
  <rect x="180" y="160" width="40" height="80" fill="#a8b0bc"/>
  <rect x="300" y="160" width="160" height="170" fill="#b8c0cc"/>
  <rect x="500" y="170" width="240" height="160" fill="#c8d0da"/>
  <!-- 機械的なオブジェクト -->
  <rect x="100" y="280" width="80" height="60" rx="4" fill="#8090a0"/>
  <rect x="200" y="260" width="120" height="80" rx="4" fill="#7080a0"/>
  <rect x="340" y="270" width="80" height="70" rx="4" fill="#8090a0"/>
  <!-- 担当者（人物） -->
  <ellipse cx="580" cy="230" rx="36" ry="38" fill="#d4a080"/>
  <rect x="548" y="264" width="64" height="100" fill="#1a4060" rx="6"/>
  <path d="M562 260 Q580 250 598 260 Q606 272 600 280 Q590 275 580 273 Q570 275 560 280 Q554 272 562 260Z" fill="#1a0808"/>
  <path d="M573 284 Q580 291 587 284" stroke="#a06040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- スマホを持っている -->
  <rect x="605" y="285" width="24" height="40" rx="4" fill="#1a2030"/>
  <rect x="608" y="288" width="18" height="34" rx="2" fill="#2a5080"/>
  <!-- バッジ -->
  <rect x="460" y="130" width="180" height="60" rx="8" fill="white" opacity="0.9"/>
  <text x="550" y="155" font-family="sans-serif" font-size="11" fill="#007080" text-anchor="middle" font-weight="bold">製造業 / 従業員50名</text>
  <text x="550" y="178" font-family="sans-serif" font-size="13" fill="#1a2e30" text-anchor="middle" font-weight="900">コスト約30%削減</text>
  <!-- ラベル -->
  <rect x="0" y="390" width="800" height="60" fill="rgba(0,112,128,0.75)"/>
  <text x="400" y="422" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">導入事例①｜製造業</text>
</svg>
