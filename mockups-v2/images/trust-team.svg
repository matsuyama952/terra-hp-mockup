  <text x="400" y="68" font-family="sans-serif" font-size="14" fill="#007080" text-anchor="middle" font-weight="bold" opacity="0.5">TERRA CORPORATE SALES</text>

  <!-- 人物 5人（背景の人） -->
  <!-- 人1 左端 -->
