  <!-- ラベル -->
  <rect x="0" y="540" width="800" height="60" fill="rgba(0,112,128,0.75)"/>
  <text x="400" y="572" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">法人専門スタッフ一同</text>
