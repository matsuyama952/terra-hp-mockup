  <ellipse cx="340" cy="310" rx="44" ry="54" fill="#d4a080"/>
  <ellipse cx="340" cy="242" rx="32" ry="34" fill="#d4a080"/>
  <ellipse cx="340" cy="228" rx="26" ry="27" fill="#c89070"/>
  <rect x="312" y="310" width="56" height="100" fill="#004a70" rx="4"/>

  <!-- 人4 -->
