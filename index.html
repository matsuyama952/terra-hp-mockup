<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERRA HP Mockups</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0a1628;
  font-family: 'Helvetica Neue', sans-serif;
  color: #fff;
  gap: 48px;
}
h1 {
  font-size: 13px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
}
.cards {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  text-decoration: none;
  color: #fff;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(26,201,218,0.25);
  padding: 36px 48px;
  transition: background 0.2s, border-color 0.2s;
}
.card:hover { background: rgba(26,201,218,0.08); border-color: rgba(26,201,218,0.6); }
.card-label {
  font-size: 10px;
  letter-spacing: 0.28em;
  color: #1AC9DA;
  text-transform: uppercase;
}
.card-title {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.08em;
}
.card-arrow { font-size: 20px; color: #1AC9DA; }
</style>
</head>
<body>
<h1>TERRA Corporate Sales — HP Mockups</h1>
<div class="cards">
  <a class="card" href="mockups/">
    <span class="card-label">Design A</span>
    <span class="card-title">現行デザイン</span>
    <span class="card-arrow">→</span>
  </a>
  <a class="card" href="mockups-v2/">
    <span class="card-label">Design B</span>
    <span class="card-title">新デザイン（v2）</span>
    <span class="card-arrow">→</span>
  </a>
</div>
</body>
</html>
